<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup | Watch Store</title>

  <style>
    body{
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: white;
      color: #222;
    }

    .header{
      background-color: black;
      padding: 25px;
      text-align: center;
      color: white;
    }

    .logo-container{
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 10px;
    }

    .logo{
      width: 50px;
      height: 50px;
      animation: rotate 8s linear infinite;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .header-text{
      text-align: left;
    }

    .header h1{
      margin: 0;
      letter-spacing: 1px;
    }

    .header p{
      margin-top: 8px;
      font-style: italic;
      opacity: 0.9;
    }

    .container{
      display: flex;
      justify-content: center;
      padding: 50px 20px;
    }

    .card{
      width: 360px;
      background: #f9f9f9;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    h2{
      margin-top: 0;
      text-align: center;
      color: navy;
    }

    label{
      font-weight: bold;
    }

    .field{
      margin-bottom: 16px;
    }

    input{
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 1px solid gray;
      border-radius: 5px;
      box-sizing: border-box;
    }

    input.error-border{
      border-color: red;
    }

    .error-msg{
      color: red;
      font-size: 0.8rem;
      margin-top: 4px;
      display: block;
      min-height: 16px;
    }

    .buttons{
      margin-top: 20px;
      text-align: center;
    }

    input[type="submit"],
    input[type="reset"]{
      padding: 10px 20px;
      margin: 0 8px;
      cursor: pointer;
      font-size: 1rem;
      border-radius: 4px;
    }

    input[type="submit"]{
      background: navy;
      color: white;
      border: none;
      box-shadow: 0 5px 12px rgba(0,0,0,0.2);
    }

    input[type="reset"]{
      background: white;
      color: navy;
      border: 2px solid navy;
    }

    .back-link{
      display: block;
      text-align: center;
      margin-top: 20px;
      color: navy;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover{
      text-decoration: underline;
    }

    @media (max-width: 500px){
      .card{
        width: 100%;
      }
      
      .logo-container{
        flex-direction: column;
        gap: 10px;
      }
      
      .header-text{
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <a href="index.html" style="text-decoration: none; color: white;">
      <div class="logo-container">
        <img src="logo.svg" alt="Watch Store Logo" class="logo">
        <div class="header-text">
          <h1>Watch Store</h1>
          <p>Signup page</p>
        </div>
      </div>
    </a>
  </div>

  <div class="container">
    <div class="card">
      <h2>Signup Form</h2>

      <form novalidate>
        <div class="field">
          <label>Name</label>
          <input type="text" placeholder="Enter your name">
          <span class="error-msg"></span>
        </div>

        <div class="field">
          <label>Mobile Number</label>
          <input type="tel" placeholder="Enter your mobile number">
          <span class="error-msg"></span>
        </div>

        <div class="field">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email">
          <span class="error-msg"></span>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="Create a password">
          <span class="error-msg"></span>
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Confirm your password">
          <span class="error-msg"></span>
        </div>

        <div class="buttons">
          <input type="submit" value="Submit"><br><br>
          <input type="reset" value="Clear">
        </div>
      </form>
      
      <a href="watch.htm" class="back-link">Back to Home</a>
    </div>
  </div>

<script src="signup.js"></script>
</body>
</html>
